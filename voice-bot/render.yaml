services:
  # 1. Backend FastAPI Service
  - type: web
    name: voco-voice-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDirectory: backend
    plan: starter # Recommend starter tier to avoid cold-starts (switch to 'free' if testing only)
    envVars:
      - key: MONGO_URI
        sync: false # Set to MongoDB Atlas Connection String
      - key: MONGO_DB_NAME
        value: voco_voice
      - key: GOOGLE_API_KEY
        sync: false # Set to Google Gemini API Key
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-live-preview
      - key: GEMINI_TEXT_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_VOICE
        value: Erinome
      - key: GEMINI_THINKING
        value: minimal
      - key: TWILIO_ACCOUNT_SID
        sync: false # Set to Twilio Account SID
      - key: TWILIO_AUTH_TOKEN
        sync: false # Set to Twilio Auth Token
      - key: TWILIO_PHONE_NUMBER
        sync: false # Set to Twilio Phone Number
      - key: EXTERNAL_URL
        sync: false # Set to this service's live HTTPS URL after deployment
      - key: ALLOWED_ORIGINS
        sync: false # Set to the React frontend URL after deployment
      - key: WHATSAPP_PROVIDER
        value: twilio # Or 'meta'
      - key: PORT
        value: 10000

  # 2. Frontend React static site
  - type: web
    name: voco-voice-frontend
    env: static
    buildCommand: npm install && npm run build
    publishPath: build
    rootDirectory: frontend
    envVars:
      - key: REACT_APP_BACKEND_URL
        fromService:
          name: voco-voice-backend
          type: web
          property: host
